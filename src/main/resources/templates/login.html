<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Verona Cafe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/verona.css}">
    <style>
        body.login-bg {
            background: linear-gradient(rgba(37, 18, 6, 0.8), rgba(37, 18, 6, 0.95)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-stone-900/90 border border-stone-800 rounded-2xl p-8 shadow-2xl backdrop-blur-sm">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="verona-logo w-20 h-20 mx-auto flex items-center justify-center text-white font-bold text-3xl font-serif mb-4">V</div>
            <h1 class="text-3xl font-bold font-serif text-amber-500 tracking-wide">Verona</h1>
            <p class="text-sm text-stone-400 tracking-widest uppercase font-semibold">Roasters & Cafe</p>
            <p class="text-xs text-stone-500 mt-2">Hệ thống Quản lý Quán Cafe</p>
        </div>

        <!-- Feedback Alert Messages -->
        <div th:if="${param.error}" class="bg-red-950/50 border border-red-800 text-red-200 px-4 py-3 rounded-lg text-sm mb-6 flex items-center gap-3">
            <span>Tên đăng nhập hoặc mật khẩu không đúng.</span>
        </div>
        <div th:if="${param.logout}" class="bg-green-950/50 border border-green-800 text-green-200 px-4 py-3 rounded-lg text-sm mb-6 flex items-center gap-3">
            <span>Bạn đã đăng xuất thành công.</span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-semibold text-stone-400 uppercase mb-2">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required placeholder="Nhập admin hoặc staff"
                       class="w-full bg-stone-950 border border-stone-800 rounded-lg py-3 px-4 text-white placeholder-stone-600 focus:outline-none focus:border-amber-500 transition-all text-sm">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-stone-400 uppercase mb-2">Mật khẩu</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                       class="w-full bg-stone-950 border border-stone-800 rounded-lg py-3 px-4 text-white placeholder-stone-600 focus:outline-none focus:border-amber-500 transition-all text-sm">
            </div>

            <button type="submit" class="btn-verona w-full py-3.5 mt-2 flex items-center justify-center gap-2 text-sm">
                Đăng Nhập
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-stone-800 text-center text-xs text-stone-600">
            <p>Tài khoản Chủ quán: <span class="text-stone-400 font-mono">admin / admin123</span></p>
            <p class="mt-1">Tài khoản Nhân viên: <span class="text-stone-400 font-mono">staff / staff123</span></p>
        </div>
    </div>

</body>
</html>
