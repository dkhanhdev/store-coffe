<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: html_head('Sơ đồ bàn ăn')}"></head>
<body class="flex flex-col min-h-screen">

    <div th:replace="~{layout :: header}"></div>

    <div class="flex flex-1">
        <div th:replace="~{layout :: sidebar(activePage='tables')}"></div>

        <main class="flex-1 p-8 bg-stone-50">
            <div class="max-w-7xl mx-auto space-y-8">
                <!-- Title -->
                <div class="flex justify-between items-center border-b border-stone-200 pb-5">
                    <div>
                        <h2 class="text-3xl font-bold font-serif text-stone-900">Sơ Đồ Bàn Phục Vụ</h2>
                        <p class="text-sm text-stone-500 mt-1">Chọn bàn ăn để đặt món mới, chỉnh sửa đơn hiện tại hoặc lập biên lai thanh toán.</p>
                    </div>
                    
                    <!-- Color Code Legend -->
                    <div class="flex gap-4 text-xs font-semibold">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full bg-green-500 border border-green-600"></span>
                            <span class="text-stone-600">Bàn Trống (Trống)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full bg-red-500 border border-red-600"></span>
                            <span class="text-stone-600">Đang Phục Vụ (Có Khách)</span>
                        </div>
                    </div>
                </div>

                <!-- Tables Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                    <div th:each="tbl : ${tables}" 
                         class="verona-card p-6 flex flex-col justify-between h-48 border-2"
                         th:classappend="${tbl.status.name() == 'AVAILABLE' ? 'table-available' : 'table-occupied'}">
                        
                        <!-- Top details -->
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-2xl font-bold font-serif" th:text="${tbl.tableNumber}">Bàn 1</h3>
                                <p class="text-xs uppercase tracking-wider font-semibold opacity-70 mt-1" 
                                   th:text="${tbl.status.name() == 'AVAILABLE' ? 'Bàn trống' : 'Đang ngồi'}">Bàn trống</p>
                            </div>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-stone-900/10 flex items-center gap-1">
                                <i class="fa-solid fa-users text-[10px]"></i>
                                <span th:text="${tbl.seatCount} + ' ghế'">4 ghế</span>
                            </span>
                        </div>

                        <!-- Table Icons decoration -->
                        <div class="text-center my-2 opacity-10">
                            <i class="fa-solid fa-mug-saucer text-4xl"></i>
                        </div>

                        <!-- Action Button -->
                        <div class="w-full">
                            <a th:href="@{/staff/pos/{id}(id=${tbl.id})}" 
                               class="w-full py-2.5 text-xs uppercase font-bold flex items-center justify-center gap-2 rounded-lg transition-all"
                               th:classappend="${tbl.status.name() == 'AVAILABLE' ? 'bg-green-700 text-white hover:bg-green-800' : 'bg-red-700 text-white hover:bg-red-800'}">
                                
                                <span th:if="${tbl.status.name() == 'AVAILABLE'}">
                                    <i class="fa-solid fa-cart-plus mr-1"></i> Đặt món
                                </span>
                                <span th:if="${tbl.status.name() == 'OCCUPIED'}">
                                    <i class="fa-solid fa-circle-right mr-1"></i> Vào Gọi Món / POS
                                </span>
                            </a>
                        </div>

                    </div>
                </div>

                <div th:if="${#lists.isEmpty(tables)}" class="text-center py-16 bg-white border border-stone-200 rounded-xl text-stone-400 italic text-sm">
                    Chưa đăng ký bàn phục vụ nào. Vui lòng thiết lập bàn trong hệ thống quản lý.
                </div>
            </div>
        </main>
    </div>

</body>
</html>
