<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: html_head('Lịch sử hóa đơn')}"/>
<body class="flex flex-col min-h-screen bg-stone-50">

    <div th:replace="~{layout :: header}"></div>

    <div class="flex flex-1">
        <div th:replace="~{layout :: sidebar(activePage='history')}"></div>

        <main class="flex-1 p-8">
            <div class="max-w-7xl mx-auto space-y-6">
                <div class="border-b border-stone-200 pb-4 mb-6">
                    <h2 class="text-3xl font-bold font-serif text-stone-900">Lịch sử hóa đơn</h2>
                    <p class="text-sm text-stone-500 mt-2">Xem danh sách các đơn hàng đã hoàn tất và mở biên lai chi tiết.</p>
                </div>

                <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <form method="get" class="flex flex-col gap-3 sm:flex-row sm:items-center">
                        <label class="text-sm font-semibold text-stone-600" for="date">Lọc theo ngày</label>
                        <input id="date" name="date" type="date" class="rounded-lg border border-stone-300 bg-stone-50 px-4 py-2 text-sm text-stone-900"
                               th:value="${selectedDate}">
                        <button type="submit" class="btn-espresso px-4 py-2 text-xs uppercase font-bold tracking-wide">
                            <i class="fa-solid fa-magnifying-glass"></i> Tìm
                        </button>
                    </form>
                    <a th:href="@{/staff/history}" class="btn-verona inline-flex items-center gap-2 rounded-lg bg-stone-900 px-4 py-2 text-xs uppercase font-semibold text-white hover:bg-stone-800">
                        <i class="fa-solid fa-rotate"></i> Xóa lọc
                    </a>
                </div>

                <div class="overflow-x-auto rounded-3xl border border-stone-200 bg-white shadow-sm">
                    <table class="min-w-full text-left text-sm text-stone-700">
                        <thead class="bg-stone-100 text-xs uppercase text-stone-500 tracking-wider">
                            <tr>
                                <th class="px-4 py-3">Mã hóa đơn</th>
                                <th class="px-4 py-3">Thời gian</th>
                                <th class="px-4 py-3">Bàn</th>
                                <th class="px-4 py-3">Tổng tiền</th>
                                <th class="px-4 py-3">Nhân viên</th>
                                <th class="px-4 py-3">Thanh toán</th>
                                <th class="px-4 py-3">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}" class="border-t border-stone-200 hover:bg-stone-50">
                                <td class="px-4 py-4 font-medium text-stone-900" th:text="${order.id}">1</td>
                                <td class="px-4 py-4" th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-07-08 15:00</td>
                                <td class="px-4 py-4" th:text="${order.table != null ? order.table.tableNumber : 'Mang về'}">Bàn 1</td>
                                <td class="px-4 py-4" th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)} + '₫'">150000₫</td>
                                <td class="px-4 py-4" th:text="${order.user.fullName}">Nguyễn Văn A</td>
                                <td class="px-4 py-4" th:text="${order.paymentMethod != null ? order.paymentMethod : 'Chưa xác định'}">Tiền mặt</td>
                                <td class="px-4 py-4">
                                    <a th:href="@{/staff/order/{id}/receipt(id=${order.id})}"
                                       class="inline-flex items-center gap-2 rounded-full bg-amber-500 px-4 py-2 text-xs font-semibold uppercase tracking-wide text-white hover:bg-amber-600">
                                        <i class="fa-solid fa-receipt"></i> Xem
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(orders)}" class="bg-white">
                                <td class="px-4 py-8 text-center text-stone-400" colspan="7">Chưa có hóa đơn hoàn tất để hiển thị.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
